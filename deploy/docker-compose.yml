services:
  ops-manual-rag-assistant:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      OPS_ASSISTANT_ENV: production
      OPS_ASSISTANT_DATA_DIR: /var/lib/ops-assistant-data
      OPS_ASSISTANT_HOST: 0.0.0.0
      OPS_ASSISTANT_PORT: 8000
      OPS_ASSISTANT_REQUIRE_AUTH: "true"
      OPS_ASSISTANT_ADMIN_USERNAME: admin
      OPS_ASSISTANT_ADMIN_PASSWORD: change-me
      OPS_ASSISTANT_LLM_ENABLED: "false"
    volumes:
      - ops_assistant_data:/var/lib/ops-assistant-data
    restart: unless-stopped

volumes:
  ops_assistant_data:
